// Mode 8: Witch Pressure
// Description: Increases Witch spawn rate to 60% per chapter, raises her
//              damage to 150 per hit, and lowers her anger threshold so she
//              startles more easily. One bad flashlight or stray shot can
//              end a run.
// Changed:     versus_witch_chance  default → 0.60
//              z_witch_damage       250     → 150
//              z_witch_anger_rate   default → 35 (angers faster)
sv_cheats 1
versus_witch_chance 0.60
z_witch_damage 150
z_witch_anger_rate 35
sv_cheats 0
echo [MODE] Witch Pressure loaded - more witches, hits harder
